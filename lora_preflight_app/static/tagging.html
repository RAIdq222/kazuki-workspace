<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoRA Preflight - タグ付け</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>タグ付け・出力作成</h1>
        <p>整形済み画像へEVA02タグと管理トリガーを付けます。</p>
      </div>
      <div class="header-actions">
        <a class="nav-button" href="/">← 画像整形へ戻る</a>
        <a class="nav-button" href="/dictionary">辞書編集</a>
        <div class="status-pill" id="serverStatus">ready</div>
      </div>
    </header>

    <main class="layout">
      <section class="panel setup-panel">
        <div class="panel-title">
          <h2>1. 画像読み込み</h2>
        </div>

        <label>
          新規キャラ画像フォルダ
          <span class="dir-row">
            <input id="inputDir" type="text" placeholder="C:\path\to\new_character\input">
            <button id="browseInput" type="button" class="browse-btn">参照…</button>
          </span>
        </label>

        <div class="actions">
          <button id="scanBtn" type="button" class="primary">サムネ一覧表示</button>
        </div>

        <div class="progress-panel">
          <progress id="taskProgress" max="100" value="0"></progress>
          <div id="progressText">待機中</div>
        </div>
      </section>

      <section class="workspace">
        <div class="workspace-head">
          <div>
            <h2>サムネ一覧表示</h2>
            <p id="imageCount">画像未読み込み</p>
          </div>
          <div class="workspace-actions">
            <button id="selectAllBtn" type="button">全選択</button>
            <button id="clearSelectionBtn" type="button">選択解除</button>
          </div>
        </div>
        <div id="imageGrid" class="image-grid empty">
          <div class="empty-state">フォルダを指定して「サムネ一覧表示」を押してください。</div>
        </div>
      </section>

      <section class="panel dictionary-panel">
        <div class="panel-title">
          <h2>2. タグつけ</h2>
          <a class="nav-button" href="/dictionary">辞書を編集</a>
        </div>

        <div class="inline-grid">
          <label>
            EVA02モデル
            <input id="eva2Model" type="text" value="wd-eva02-large-tagger-v3">
          </label>
          <label>
            EVA02しきい値
            <input id="eva2Threshold" type="number" value="0.35" min="0.01" max="1" step="0.01">
          </label>
        </div>

        <label class="checkline compact-check">
          <input id="useSidecarFallback" type="checkbox" checked>
          EVA02が空の時だけ同名txtを使う
        </label>

        <div class="filter-status">
          <div>
            <div class="filter-title">タグ語彙フィルター</div>
            <div id="summary" class="summary">確認中...</div>
          </div>
        </div>

        <div class="actions">
          <button id="tagBtn" type="button" class="primary" disabled>タグつけ</button>
        </div>
      </section>

      <section class="panel trigger-panel">
        <div class="panel-title">
          <h2>3. トリガー設定</h2>
        </div>

        <div class="inline-grid">
          <label>
            キャラトリガー
            <input id="characterTrigger" type="text" placeholder="例: CHR001">
          </label>
          <label>
            共通タグ
            <input id="commonTags" type="text" placeholder="例: 1girl, solo">
          </label>
        </div>

        <div class="trigger-block">
          <div class="panel-title">
            <h3>管理トリガー</h3>
            <button id="addTriggerBtn" type="button">行を追加</button>
          </div>
          <div id="triggerRows" class="trigger-rows"></div>
          <div class="bulk-row">
            <select id="bulkTrigger"></select>
            <button id="bulkOnBtn" type="button">選択画像へON</button>
            <button id="bulkOffBtn" type="button">選択画像へOFF</button>
          </div>
        </div>
      </section>

      <section class="panel build-panel">
        <div class="panel-title">
          <h2>4. 出力作成</h2>
        </div>

        <label>
          出力フォルダ
          <span class="dir-row">
            <input id="outputDir" type="text" placeholder="空欄なら入力フォルダ名_preflight">
            <button id="browseOutput" type="button" class="browse-btn">参照…</button>
          </span>
        </label>

        <div class="actions">
          <button id="buildBtn" type="button" class="primary" disabled>AI Toolkit投入前まで作成</button>
          <button id="startBtn" type="button">AI Toolkitへ流し込んで開始</button>
          <a class="nav-button" href="/">← 画像整形へ戻る</a>
        </div>
      </section>
    </main>

    <dialog id="resultDialog">
      <h2>出力完了</h2>
      <p id="resultText"></p>
      <pre id="warningText"></pre>
      <button id="closeDialogBtn" type="button">閉じる</button>
    </dialog>

    <script src="/static/app.js"></script>
  </body>
</html>
