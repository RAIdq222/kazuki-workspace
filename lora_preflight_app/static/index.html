<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoRA Preflight - 画像整形</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>画像整形・アップスケール</h1>
        <p>入力画像をLoRA学習用の規定サイズへ整えます。</p>
      </div>
      <div class="header-actions">
        <a class="nav-button" href="/tagging">タグ付けへ</a>
        <a class="nav-button" href="/dictionary">辞書編集</a>
        <div class="status-pill" id="serverStatus">ready</div>
      </div>
    </header>

    <main class="layout">
      <section class="panel setup-panel">
        <div class="panel-title">
          <h2>1. 画像フォルダ</h2>
        </div>

        <label>
          入力画像フォルダ
          <input id="inputDir" type="text" placeholder="C:\path\to\raw_images">
        </label>

        <div class="actions">
          <button id="scanBtn" type="button" class="primary">画像一覧表示</button>
        </div>

        <div class="progress-panel">
          <progress id="taskProgress" max="100" value="0"></progress>
          <div id="progressText">待機中</div>
        </div>
      </section>

      <section class="workspace">
        <div class="workspace-head">
          <div>
            <h2>整形対象</h2>
            <p id="imageCount">画像未読み込み</p>
          </div>
          <div class="workspace-actions">
            <a class="nav-button" href="/tagging">タグ付けへ</a>
          </div>
        </div>
        <div id="imageGrid" class="image-grid empty">
          <div class="empty-state">フォルダを指定して「画像一覧表示」を押してください。</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>2. 規定サイズ</h2>
        </div>

        <input id="targetSizes" type="hidden" value="1024x1024, 1152x896, 1216x832, 1344x768, 1536x640">
        <div class="target-size-grid" aria-label="候補サイズ">
          <label class="target-size-option">
            <input class="target-size-choice" type="checkbox" value="1024x1024" checked>
            <span>1024x1024</span>
          </label>
          <label class="target-size-option">
            <input class="target-size-choice" type="checkbox" value="1152x896" checked>
            <span>1152x896</span>
          </label>
          <label class="target-size-option">
            <input class="target-size-choice" type="checkbox" value="1216x832" checked>
            <span>1216x832</span>
          </label>
          <label class="target-size-option">
            <input class="target-size-choice" type="checkbox" value="1344x768" checked>
            <span>1344x768</span>
          </label>
          <label class="target-size-option">
            <input class="target-size-choice" type="checkbox" value="1536x640" checked>
            <span>1536x640</span>
          </label>
        </div>

        <label class="checkline compact-check">
          <input id="allowRotate" type="checkbox" checked>
          縦横入替を許可
        </label>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>3. 切り取り</h2>
        </div>
        <input id="cropMargin" type="hidden" value="0">
        <input id="trimThreshold" type="hidden" value="18">
        <div class="fixed-setting">余白追加なし / 指定サイズへ最小切り取り</div>
      </section>

      <section class="panel upscaler-panel">
        <div class="panel-title">
          <h2>4. アップスケーラー</h2>
        </div>

        <label>
          アップスケーラー方式
          <select id="upscalerMode">
            <option value="none" selected>使わない</option>
            <option value="sdwebui">Stable Diffusion WebUI / Forge API</option>
            <option value="standalone">Real-ESRGAN単体exe</option>
            <option value="custom">手書きコマンド</option>
          </select>
        </label>

        <div class="upscaler-mode-block" data-upscaler-block="sdwebui">
          <div class="inline-grid">
            <label>
              WebUI API URL
              <input id="sdWebuiUrl" type="text" value="http://127.0.0.1:7860">
            </label>
            <label>
              Upscaler名
              <input id="sdWebuiUpscaler" type="text" value="R-ESRGAN 4x+ Anime6B">
            </label>
          </div>
          <span class="hint">WebUI/ForgeをAPI有効で起動している時だけ使えます。</span>
        </div>

        <div class="upscaler-mode-block" data-upscaler-block="standalone">
          <label>
            Real-ESRGAN実行ファイル
            <input id="realesrganExe" type="text" placeholder="例: C:\tools\realesrgan-ncnn-vulkan.exe">
          </label>
          <div class="inline-grid">
            <label>
              モデル名
              <input id="realesrganModel" type="text" value="realesrgan-x4plus-anime">
            </label>
            <label>
              倍率
              <input id="realesrganScale" type="number" value="1" min="1" max="4">
            </label>
          </div>
          <div class="inline-grid">
            <label>
              モデルフォルダ
              <input id="realesrganModelDir" type="text" placeholder="空欄可">
            </label>
            <label>
              tile
              <input id="realesrganTile" type="number" placeholder="空欄可">
            </label>
          </div>
        </div>

        <div class="upscaler-mode-block" data-upscaler-block="custom">
          <label>
            Real-ESRGANコマンド
            <input id="upscalerCommand" type="text" placeholder="例: realesrgan-ncnn-vulkan.exe -i &quot;{input}&quot; -o &quot;{output}&quot; -s 1 -n realesrgan-x4plus-anime">
            <span class="hint">`{input}` と `{output}` が自動で置換されます。</span>
          </label>
        </div>
      </section>

      <section class="panel build-panel">
        <div class="panel-title">
          <h2>5. 整形実行</h2>
        </div>

        <label>
          出力フォルダ
          <input id="outputDir" type="text" placeholder="空欄なら入力フォルダ名_prepared">
        </label>

        <div id="outputSummary" class="summary">未実行</div>
        <div class="actions">
          <button id="prepareBtn" type="button" class="primary" disabled>画像整形を実行</button>
          <a class="nav-button" href="/tagging">タグ付けへ進む</a>
        </div>
      </section>
    </main>

    <script src="/static/prepare.js"></script>
  </body>
</html>
